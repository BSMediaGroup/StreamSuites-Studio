<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b10" />
    <link rel="icon" href="/assets/icons/studiofavicon.ico" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="StreamSuites Studio is the closed, invite-only ALPHA foundation for a browser livestream-production studio."
    />
    <title>StreamSuites Studio — Closed ALPHA</title>
    <script>
      (() => {
        let stored = null;
        try {
          stored = localStorage.getItem("streamsuites_studio_theme");
        } catch {
          stored = null;
        }
        const theme = stored === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document.querySelector('meta[name="theme-color"]')?.setAttribute(
          "content",
          theme === "dark" ? "#080a0f" : "#f4f6f8",
        );
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
